<svg width="180" height="198" viewBox="0 0 180 198" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hexbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#060e1a"/>
    </linearGradient>
  </defs>
  <!-- Hexagon shape -->
  <polygon points="90,6 172,51 172,141 90,186 8,141 8,51"
