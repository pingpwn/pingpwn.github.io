  <!-- VA initials -->
  <text x="90" y="108" font-family="'Inter','Helvetica Neue',sans-serif"
        font-size="58" font-weight="700" fill="#00ff9d"
        text-anchor="middle" dominant-baseline="middle"
        letter-spacing="-1">VA</text>
  <!-- Divider -->
  <line x1="42" y1="122" x2="138" y2="122" stroke="#1af2ff" stroke-width="0.8" opacity="0.45"/>
  <!-- ePORTFOLIO label -->
  <text x="90" y="141" font-family="'Inter','Helvetica Neue',sans-serif"
        font-size="11.5" fill="#1af2ff" text-anchor="middle" letter-spacing="3.5">ePORTFOLIO</text>
